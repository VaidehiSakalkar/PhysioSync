version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION COMPOSE — full stack
# Usage: docker compose -f infra/docker-compose.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

networks:
  physiolink-net:
    driver: bridge
  physiolink-public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chroma_data:
  zookeeper_data:
  kafka_data:

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: physiolink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-physiolink}
      POSTGRES_USER: ${POSTGRES_USER:-physio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-physio123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-physio} -d ${POSTGRES_DB:-physiolink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - physiolink-net

  redis:
    image: redis:7-alpine
    container_name: physiolink-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - physiolink-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: physiolink-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - physiolink-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: physiolink-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - physiolink-net

  minio:
    image: minio/minio:latest
    container_name: physiolink-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - physiolink-net
      - physiolink-public

  chromadb:
    image: chromadb/chroma:latest
    container_name: physiolink-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - physiolink-net

  # ── Spring Boot Services ────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: physiolink-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - physiolink-net
      - physiolink-public

  patient-service:
    build:
      context: ../services/patient-service
      dockerfile: Dockerfile
    container_name: physiolink-patient
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/physiolink}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-physio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-physio123}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - physiolink-net

  exercise-service:
    build:
      context: ../services/exercise-service
      dockerfile: Dockerfile
    container_name: physiolink-exercise
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/physiolink}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-physio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-physio123}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - physiolink-net

  appointment-service:
    build:
      context: ../services/appointment-service
      dockerfile: Dockerfile
    container_name: physiolink-appointment
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/physiolink}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-physio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-physio123}
      REDIS_HOST: redis
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - physiolink-net

  video-service:
    build:
      context: ../services/video-service
      dockerfile: Dockerfile
    container_name: physiolink-video
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      - minio
    networks:
      - physiolink-net

  # ── ML Service ──────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: physiolink-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EXERCISE_SERVICE_URL: http://exercise-service:8082
    depends_on:
      - chromadb
      - kafka
    networks:
      - physiolink-net
      - physiolink-public

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_ML_WS_URL: ${VITE_ML_WS_URL:-ws://localhost:8000}
        VITE_VIDEO_WS_URL: ${VITE_VIDEO_WS_URL:-ws://localhost:8084}
    container_name: physiolink-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - physiolink-public
