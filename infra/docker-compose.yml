version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION COMPOSE — full stack
# Usage: docker compose -f infra/docker-compose.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

networks:
  physiolink-net:
    driver: bridge
  physiolink-public:
    driver: bridge

volumes:
  redis_data:
  minio_data:
  chroma_data:
  zookeeper_data:
  kafka_data:

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: physiolink-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - physiolink-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: physiolink-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - physiolink-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: physiolink-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - physiolink-net

  minio:
    image: minio/minio:latest
    container_name: physiolink-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - physiolink-net
      - physiolink-public

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: physiolink-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - physiolink-net

  # ── Spring Boot Services ────────────────────────────────────────────────────
  api-gateway:
    image: sagar8/infra-api-gateway:latest
    container_name: physiolink-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PATIENT_SERVICE_HOST: patient-service
      EXERCISE_SERVICE_HOST: exercise-service
      APPOINTMENT_SERVICE_HOST: appointment-service
      VIDEO_SERVICE_HOST: video-service
      ML_SERVICE_HOST: ml-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - physiolink-net
      - physiolink-public

  patient-service:
    image: sagar8/infra-patient-service:latest
    container_name: physiolink-patient
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/physiolink}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-physio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-physio123}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
    depends_on:
      kafka:
        condition: service_started
    networks:
      - physiolink-net

  exercise-service:
    image: sagar8/infra-exercise-service:latest
    container_name: physiolink-exercise
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/physiolink}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-physio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-physio123}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
    depends_on:
      kafka:
        condition: service_started
    networks:
      - physiolink-net

  appointment-service:
    image: sagar8/infra-appointment-service:latest
    container_name: physiolink-appointment
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/physiolink}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-physio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-physio123}
      REDIS_HOST: redis
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - physiolink-net

  video-service:
    image: sagar8/infra-video-service:latest
    container_name: physiolink-video
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      - minio
    networks:
      - physiolink-net
      - physiolink-public

  # ── ML Service ──────────────────────────────────────────────────────────────
  ml-service:
    image: sagar8/infra-ml-service:latest
    container_name: physiolink-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EXERCISE_SERVICE_URL: http://exercise-service:8082
    depends_on:
      - chromadb
      - kafka
    networks:
      - physiolink-net
      - physiolink-public

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    image: sagar8/infra-frontend:latest
    container_name: physiolink-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - physiolink-public

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  # Single entry point: routes REST to api-gateway and WebSocket to services
  # directly (Spring RestTemplate cannot proxy WebSocket upgrades).
  nginx:
    image: nginx:alpine
    container_name: physiolink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - ml-service
      - video-service
    networks:
      - physiolink-net
      - physiolink-public

  # ── Ngrok Tunnel ────────────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: physiolink-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: "http nginx:80"
    depends_on:
      - nginx
    networks:
      - physiolink-net
