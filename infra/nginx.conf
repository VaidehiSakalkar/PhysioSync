# ─── Nginx Reverse Proxy ──────────────────────────────────────────────────────
# Single entry point for all traffic.
# - REST API  (/api/*)   → api-gateway:8080  (HTTP)
# - Pose WS   (/ws/pose) → ml-service:8000   (WebSocket)
# - Video WS  (/ws/video)→ video-service:8084 (WebSocket)
#
# RestTemplate in the Spring API Gateway is HTTP-only and cannot handle
# WebSocket upgrades. Nginx handles the WS upgrade handshake natively.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;

    # ── Pose estimation WebSocket ──────────────────────────────────────────────
    location /ws/pose {
        proxy_pass http://ml-service:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # keep long-lived WS open
        proxy_send_timeout 3600s;
    }

    # ── Video signaling WebSocket ──────────────────────────────────────────────
    location /ws/video {
        proxy_pass http://video-service:8084;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API + everything else → Spring API Gateway ───────────────────────
    location / {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
