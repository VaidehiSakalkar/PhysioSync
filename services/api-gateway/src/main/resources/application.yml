server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:file:../../.env[.properties]

  # ── Redis (blocking Lettuce — used by RateLimitFilter if switched to distributed buckets) ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ── Gateway route table ───────────────────────────────────────────────────────
# ReverseProxyFilter matches routes top-to-bottom; place more-specific prefixes first.
# /api/auth is public (JWT filter skips it via shouldNotFilter); all others are protected.
gateway:
  routes:
    - prefix: /api/auth
      target: http://${PATIENT_SERVICE_HOST:localhost}:8081

    - prefix: /api/patients
      target: http://${PATIENT_SERVICE_HOST:localhost}:8081

    - prefix: /api/physios
      target: http://${PATIENT_SERVICE_HOST:localhost}:8081

    - prefix: /api/exercises
      target: http://${EXERCISE_SERVICE_HOST:localhost}:8082

    - prefix: /api/appointments
      target: http://${APPOINTMENT_SERVICE_HOST:localhost}:8083

    - prefix: /api/video
      target: http://${VIDEO_SERVICE_HOST:localhost}:8084

    - prefix: /ws/pose
      target: ws://${ML_SERVICE_HOST:localhost}:8000

    - prefix: /api/ask
      target: http://${ML_SERVICE_HOST:localhost}:8000

  rate-limit:
    replenish-rate: 10   # tokens added per second (sustained throughput)
    burst-capacity: 20   # maximum token accumulation (allows short bursts)

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-please-change-in-production-ok}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
