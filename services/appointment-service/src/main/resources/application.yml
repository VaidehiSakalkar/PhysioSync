server:
  port: 8083

spring:
  application:
    name: appointment-service
  config:
    import: optional:file:../../.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5432/physiolink}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:physio}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:physio123}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Redis (email deduplication) ───────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ── Email ─────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    from: ${MAIL_FROM:noreply@physiolink.dev}

# ── Reminder scheduler ─────────────────────────────────────────────────────────
reminder:
  window-hours: 24        # look-ahead window
  cron: "0 */15 * * * *"  # run every 15 minutes

# ── Internal service URLs ─────────────────────────────────────────────────────
services:
  patient:
    url: ${PATIENT_SERVICE_URL:http://localhost:8081}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
