server:
  port: 8082

spring:
  application:
    name: exercise-service
  config:
    import: optional:file:../../.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5432/physiolink}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:physio}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:physio123}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

