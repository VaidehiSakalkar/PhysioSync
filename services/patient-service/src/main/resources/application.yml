server:
  port: 8081

spring:
  application:
    name: patient-service
  config:
    import: optional:file:../../.env[.properties]

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5432/physiolink}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:physio}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:physio123}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # schema is managed by init.sql
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: patient-service
      auto-offset-reset: earliest

# ── JWT (used to sign tokens) ─────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:dev-insecure-secret-change-me}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
